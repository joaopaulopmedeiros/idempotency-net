name: build

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: preview

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p artifacts
          dotnet pack src/Idempotency/Idempotency.csproj -c Release --no-build -p:Version="$VERSION" -o artifacts
          dotnet pack src/Idempotency.AspNetCore/Idempotency.AspNetCore.csproj -c Release --no-build -p:Version="$VERSION" -o artifacts
          dotnet pack src/Idempotency.Redis/Idempotency.Redis.csproj -c Release --no-build -p:Version="$VERSION" -o artifacts
          dotnet pack src/Idempotency.PostgreSql/Idempotency.PostgreSql.csproj -c Release --no-build -p:Version="$VERSION" -o artifacts

      - name: Push to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --skip-duplicate